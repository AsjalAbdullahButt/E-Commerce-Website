<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | E-COM Admin</title>
  
  <!-- AUTH GUARD — Runs FIRST before page renders -->
  <script>
    (function() {
      const token = localStorage.getItem('ecom_token');
      const user = JSON.parse(localStorage.getItem('ecom_user') || 'null');
      if (!token || !user) { window.location.replace('../login.html'); return; }
      const isAdminPage = true;
      if (isAdminPage && user.role !== 'admin') { window.location.replace('../index.html'); return; }
    })();
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body data-page="admin-products">

  <canvas id="neural-bg"></canvas>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="../index.html"><span class="logo-e">E</span><span class="logo-dash">-</span><span class="logo-com">COM</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="./dashboard.html">Dashboard</a></li>
        <li><a href="./products.html" class="active">Products</a></li>
        <li><a href="./orders.html">Orders</a></li>
        <li><a href="./promos.html">Promos</a></li>
      </ul>
      <div class="nav-actions">
        <button class="nav-icon" id="nav-logout-btn" aria-label="Logout" style="background:none;border:none;cursor:pointer"><i class="fas fa-sign-out-alt"></i></button>
        <!-- Dark/Light Mode Toggle -->
        <button class="nav-icon theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Switch theme">
          <i class="fas fa-moon" id="theme-icon"></i>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <div class="admin-header">
      <h1 class="dashboard-title">Products</h1>
      <button class="btn-primary" onclick="alert('Add product feature coming soon')">+ Add Product</button>
    </div>

    <!-- Image URL Preview Section -->
    <div class="admin-form-section" id="image-section">
      <h2>Product Images (URL Preview)</h2>
      <p class="admin-section-desc">Add and preview product images by URL before uploading</p>
      
      <div class="image-url-form">
        <div class="url-input-row">
          <input type="url" 
                 id="image-url-input" 
                 class="form-control"
                 placeholder="Enter image URL (e.g., https://...)"
                 aria-label="Image URL input">
          <button type="button" class="btn-secondary" onclick="addImageRow()">
            <i class="fas fa-plus"></i> Add
          </button>
        </div>

        <div id="image-urls-container" class="image-urls-list">
          <!-- Image rows will be added here -->
        </div>

        <div class="image-preview-grid" id="image-preview-grid">
          <!-- Images will be previewed here -->
        </div>
      </div>
    </div>

    <section data-section="products"></section>
  </main>

  <footer class="footer">
    <div class="footer-bottom"><p>&copy; 2025 E-Commerce Admin Panel.</p></div>
  </footer>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/neural-bg.js"></script>

  <script>
    document.getElementById('nav-logout-btn').addEventListener('click', () => {
      clearAuth();
      showToast('Logged out');
      window.location.href = '../login.html';
    });
  </script>

  <!-- WhatsApp Support Button — TODO: replace number with real WhatsApp Business number -->
  <a href="https://wa.me/923001234567?text=Hi%2C%20I%20need%20help%20with%20my%20E-COM%20order"
     class="whatsapp-float"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Chat with us on WhatsApp"
     title="WhatsApp Support">
    <i class="fab fa-whatsapp"></i>
  </a>
</body>
</html>
