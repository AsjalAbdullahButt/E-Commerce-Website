<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Tribe of 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body data-page="admin-dashboard">

  <canvas id="neural-bg"></canvas>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="../index.html">TRIBE<span>OF5</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="./dashboard.html" class="active">Dashboard</a></li>
        <li><a href="./products.html">Products</a></li>
        <li><a href="./orders.html">Orders</a></li>
        <li><a href="./promos.html">Promos</a></li>
      </ul>
      <div class="nav-actions">
        <button class="nav-icon" id="nav-logout-btn" aria-label="Logout" style="background:none;border:none;cursor:pointer"><i class="fas fa-sign-out-alt"></i></button>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <h1 class="dashboard-title">Admin Dashboard</h1>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-wallet"></i></div>
        <div class="stat-content">
          <p class="stat-label">Total Revenue</p>
          <p class="stat-value" data-stat="revenue">Rs 0</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
        <div class="stat-content">
          <p class="stat-label">Total Orders</p>
          <p class="stat-value" data-stat="orders">0</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-clock"></i></div>
        <div class="stat-content">
          <p class="stat-label">Pending Orders</p>
          <p class="stat-value" data-stat="pending">0</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-box"></i></div>
        <div class="stat-content">
          <p class="stat-label">Total Products</p>
          <p class="stat-value" data-stat="products">0</p>
        </div>
      </div>
    </div>

    <section class="recent-section">
      <h2 class="section-title">Recent Orders</h2>
      <div data-section="recent-orders"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-bottom"><p>&copy; 2025 Tribe of 5 Admin Panel.</p></div>
  </footer>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/neural-bg.js"></script>

  <script>
    document.getElementById('nav-logout-btn').addEventListener('click', () => {
      clearAuth();
      showToast('Logged out');
      window.location.href = '../login.html';
    });
  </script>
</body>
</html>
