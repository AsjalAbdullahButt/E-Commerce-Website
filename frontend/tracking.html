<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | E-COM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/tracking.css">
</head>
<body>

  <canvas id="neural-bg"></canvas>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="./index.html"><img src="./images/E_Commerce_Logo.png" alt="E-COM" class="nav-logo-img" onerror="this.style.display='none'"><span class="logo-e">E</span><span class="logo-dash">-</span><span class="logo-com">COM</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./shop.html">Shop</a></li>
        <li><a href="./about.html">About</a></li>
        <li><a href="./contact.html">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="./profile.html"  class="nav-icon" id="nav-profile-btn"  aria-label="Profile"><i class="fas fa-user"></i></a>
        <a href="./login.html"    class="nav-icon" id="nav-login-btn"    aria-label="Login"><i class="fas fa-sign-in-alt"></i></a>
        <button                   class="nav-icon" id="nav-logout-btn"   aria-label="Logout" style="background:none;border:none;cursor:pointer"><i class="fas fa-sign-out-alt"></i></button>
        <button class="nav-icon cart-icon-btn" id="cart-toggle" aria-label="Cart">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-badge" id="cart-badge">0</span>
        </button>
        <!-- Dark/Light Mode Toggle -->
        <button class="nav-icon theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Switch theme">
          <i class="fas fa-moon" id="theme-icon"></i>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer"></aside>

  <main>
    <div class="tracking-header">
      <h1 class="order-id"></h1>
    </div>

    <div class="tracking-container">
      <div class="status-timeline"></div>

      <div class="order-items"></div>

      <div class="shipping-info"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <p class="footer-logo"><span class="logo-e">E</span><span class="logo-dash">-</span><span class="logo-com">COM</span></p>
        <p>Your one-stop shop for everything. Quality products, fast delivery.</p>
      </div>
      <div class="footer-col">
        <h4>Shop</h4>
        <a href="./shop.html">All Products</a>
        <a href="./about.html">Our Story</a>
        <a href="./contact.html">Contact Us</a>
      </div>
      <div class="footer-col">
        <h4>Account</h4>
        <a href="./login.html">Login</a>
        <a href="./register.html">Register</a>
        <a href="./profile.html">My Orders</a>
        <a href="./tracking.html">Track Order</a>
      </div>
      <div class="footer-col">
        <h4>Follow Us</h4>
        <div class="footer-socials">
          <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
          <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
          <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom"><p>&copy; 2025 E-Commerce. All rights reserved.</p></div>
  </footer>

  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/tracking.js"></script>
  <script src="./js/neural-bg.js"></script>

  <!-- WhatsApp Support Button — TODO: replace number with real WhatsApp Business number -->
  <a href="https://wa.me/923001234567?text=Hi%2C%20I%20need%20help%20with%20my%20E-COM%20order"
     class="whatsapp-float"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Chat with us on WhatsApp"
     title="WhatsApp Support">
    <i class="fab fa-whatsapp"></i>
  </a>
</body>
</html>
