<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Tribe of 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/shop.css">
</head>
<body>

  <canvas id="neural-bg"></canvas>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="./index.html">TRIBE<span>OF5</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./shop.html" class="active">Shop</a></li>
        <li><a href="./about.html">About</a></li>
        <li><a href="./contact.html">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="./profile.html"  class="nav-icon" id="nav-profile-btn"  aria-label="Profile"><i class="fas fa-user"></i></a>
        <a href="./login.html"    class="nav-icon" id="nav-login-btn"    aria-label="Login"><i class="fas fa-sign-in-alt"></i></a>
        <button                   class="nav-icon" id="nav-logout-btn"   aria-label="Logout" style="background:none;border:none;cursor:pointer"><i class="fas fa-sign-out-alt"></i></button>
        <button class="nav-icon cart-icon-btn" id="cart-toggle" aria-label="Cart">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-badge" id="cart-badge">0</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer"></aside>

  <main>
    <div class="shop-header">
      <h1 class="shop-title">Shop Our Collection</h1>
    </div>

    <div class="filters-bar">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" placeholder="Search products..." data-search>
      </div>
      <div class="filter-group">
        <label>Category</label>
        <select data-category>
          <option value="">All Categories</option>
          <option value="t-shirts">T-Shirts</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select data-sort>
          <option value="newest">Newest</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
    </div>

    <div class="product-grid"></div>

    <div class="load-more">
      <button>Load More</button>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <p class="footer-logo">TRIBE<span>OF5</span></p>
        <p>Premium drop-shoulder T-shirts. Crafted for the bold.</p>
      </div>
      <div class="footer-col">
        <h4>Shop</h4>
        <a href="./shop.html">All Products</a>
        <a href="./about.html">Our Story</a>
        <a href="./contact.html">Contact Us</a>
      </div>
      <div class="footer-col">
        <h4>Account</h4>
        <a href="./login.html">Login</a>
        <a href="./register.html">Register</a>
        <a href="./profile.html">My Orders</a>
        <a href="./tracking.html">Track Order</a>
      </div>
      <div class="footer-col">
        <h4>Follow Us</h4>
        <div class="footer-socials">
          <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
          <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
          <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom"><p>&copy; 2025 Tribe of 5. All rights reserved.</p></div>
  </footer>

  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/shop.js"></script>
  <script src="./js/neural-bg.js"></script>
</body>
</html>
